<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Notes</title>
<link rel="stylesheet" href="assets/blog.css">
</head>
<body>

<header class="site-head">
  <h1 id="site-title">Research Notes</h1>
  <p id="site-tagline"></p>
  <nav class="nav" id="site-nav"></nav>
</header>

<div class="filters" id="filters"></div>
<main id="categories"></main>

<footer>Static site · hosted on GitHub Pages · edit <code>data.js</code> to add notes</footer>

<script src="data.js"></script>
<script>
  // ---- header ----
  document.getElementById('site-title').textContent = BLOG.title;
  document.getElementById('site-tagline').textContent = BLOG.tagline;
  document.getElementById('site-nav').innerHTML =
    BLOG.links.map(l => `<a href="${l.href}">${l.text}</a>`).join('');

  // ---- category filter chips ----
  const filters = document.getElementById('filters');
  const chips = [{id:'all', name:'All'}].concat(BLOG.categories);
  filters.innerHTML = chips.map((c,i) =>
    `<button data-cat="${c.id}" class="${i===0?'active':''}">${c.name}</button>`).join('');

  // ---- render a note card ----
  function noteHTML(n){
    const tags = (n.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    return `<div class="note">
      <a class="title" href="${n.file}">${n.title}</a>
      <div class="meta">${n.date} &nbsp;·&nbsp; ${n.paper||''}</div>
      <div class="summary">${n.summary||''}</div>
      ${tags}
    </div>`;
  }

  // ---- render all categories ----
  function render(active){
    const wrap = document.getElementById('categories');
    wrap.innerHTML = BLOG.categories
      .filter(c => active==='all' || c.id===active)
      .map(c => `<section class="category" data-cat="${c.id}">
          <h2>${c.name} <span class="count">${c.notes.length}</span></h2>
          <p class="blurb">${c.blurb||''}</p>
          ${c.notes.length ? c.notes.map(noteHTML).join('')
                           : '<p class="blurb"><em>Notes coming soon.</em></p>'}
        </section>`).join('');
  }
  render('all');

  // ---- filter clicks ----
  filters.addEventListener('click', e => {
    if(e.target.tagName!=='BUTTON') return;
    filters.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    render(e.target.dataset.cat);
  });
</script>
</body>
</html>
